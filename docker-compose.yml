services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ferrebot
      POSTGRES_USER: ferrebot
      POSTGRES_PASSWORD: ferrebot
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferrebot -d ferrebot"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
    environment:
      PORT: 3001
      DATABASE_URL: postgres://ferrebot:ferrebot@db:5432/ferrebot
      CORS_ORIGIN: http://localhost:5173
      JWT_SECRET: change-me-in-prod
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"

  web:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://3.17.155.131:3001
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  db_data:
